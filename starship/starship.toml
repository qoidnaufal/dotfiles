"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "default"
format = """

$status\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$time\
$character\
"""

[palettes.default]
prompt_ok  = "#8047c1"
prompt_err = "#e23140"
icon       = "#161514"
separator  = "#35312c"
bg0        = "#504945"
fg0        = "#e9f42d"

directory  = "#9f31e2"
duration   = "#e26f31"
status     = "#e23140"
git_branch = "#31e268"
git_status = "#31e268"

[character]
success_symbol = "[ вќЇ](fg:prompt_ok)"
error_symbol = "[ вќЇ](fg:prompt_err)"

[status]
format = "[в”Ђ](fg:separator)[о‚¶](fg:status)[оЅ¶](fg:icon bg:status)[о‚ґ](fg:status bg:bg0)[ $status](bg:bg0)[о‚ґ](fg:bg0)"
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = "[в”Ђ](fg:separator)[о‚¶](fg:status)[оЅ¶](fg:icon bg:status)[о‚ґ](fg:status bg:bg0)[ $pipestatus](bg:bg0)[о‚ґ](fg:bg0)"
disabled = false

[directory]
format = "[в”Ђ](fg:separator)[о‚¶](fg:directory)[пЃ»](fg:icon bg:directory)[о‚ґ](fg:directory bg:bg0)[ $path](bg:bg0 fg:fg0)[о‚ґ](fg:bg0)"
truncate_to_repo = false
truncation_length = 0

[directory.substitutions]
"Documents" = "у°€™"
"Downloads" = "пЂ™"
"Music" = "у°ќљ"
"Pictures" = "пЂѕ"
"Repos" = "у°І‹"

[git_branch]
format = "[в”Ђ](fg:separator)[о‚¶](fg:git_branch)[о‚ ](fg:icon bg:git_branch)[о‚ґ](fg:git_branch bg:bg0)[ $branch](bg:bg0 fg:fg0)"

[git_status]
format = "[о‚ґ](fg:bg0 bg:git_status)[$all_status$ahead_behind](fg:icon bg:git_status)[о‚ґ](fg:git_status)"

[cmd_duration]
format = "[в”Ђ](fg:separator)[о‚¶](fg:duration)[у±ђ‹](fg:icon bg:duration)[о‚ґ](fg:duration bg:bg0)[ $duration](bg:bg0 fg:fg0)[о‚ґ](fg:bg0)"
min_time = 1000

[time]
format = "[в”Ђ](fg:separator)[о‚¶](fg:duration)[у°Ґ”](fg:icon bg:duration)[о‚ґ](fg:duration bg:bg0)[ $time](bg:bg0 fg:fg0)[о‚ґ](fg:bg0)"
disabled = true
